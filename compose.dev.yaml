
services:
  
  ui-service:
    image: shop-ui-service
    build:
      context: ./Shop
      dockerfile: Dockerfile
    pull_policy: build
    ports: 
      - "8105:8105"    
    healthcheck:
      test: "curl -f http://localhost:8105/"
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  users-service:
    image: shop-users-service
    build:
      context: .
      dockerfile: UsersService/UsersService/Dockerfile
    pull_policy: build
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CONNECTION_STRING: Host=postgres:5432;Username=postgres;Password=P@ssw0rd;Database=UsersDb
      RMQ_HOST: rabbitmq
      RMQ_PORT: 5672
      RMQ_USER: guest
      RMQ_PASSWORD: guest
      RMQ_VHOST: /
    healthcheck:
      test: "curl -f http://localhost:8080/health"
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shop-network
      - shop-pg-network
  
  cart-service:
    image: shop-cart-service
    build:
      context: .
      dockerfile: CartService/CartService/Dockerfile
    pull_policy: build
    environment:
      CONNECTION_STRING: Host=postgres:5432;Username=postgres;Password=P@ssw0rd;Database=CartDb
      RMQ_HOST: rabbitmq
      RMQ_PORT: 5672
      RMQ_USER: guest
      RMQ_PASSWORD: guest
      RMQ_CART_PRODUCT_QUEUE: cart-product-messages-queue
      RMQ_PRODUCT_EXCHANGE: product-messages-exchange
      Keycloak__AuthServerUrl: http://keycloak:8080
      Keycloak__Realm: shop
      Keycloak__ClientId: shop-services
      Keycloak__ClientSecret: service-secret-123
      
    healthcheck:
      test: "curl -f http://localhost:8080/health"
      interval: 5s
      timeout: 5s
      retries: 5
    
    restart: unless-stopped
    
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
       condition: service_started  

    networks:
      - shop-network
      - shop-pg-network
  
  favorite-service:
    image: shop-favorite-service
    build:
      context: .
      dockerfile: FavoriteService/FavoriteService/Dockerfile
    pull_policy: build
    environment:
      CONNECTION_STRING: Host=postgres:5432;Username=postgres;Password=P@ssw0rd;Database=FavoriteDb

    healthcheck:
      test: "curl -f http://localhost:8080/health"
      interval: 5s
      timeout: 5s
      retries: 5

    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - shop-network
      - shop-pg-network
  
  catalog-service:
    image: shop-catalog-service
    build:
      context: .
      dockerfile: CatalogService/CatalogService/Dockerfile
    pull_policy: build
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CONNECTION_STRING: Host=postgres:5432;Username=postgres;Password=P@ssw0rd;Database=CatalogDb
      RMQ_HOST: rabbitmq
      RMQ_PORT: 5672
      RMQ_USER: guest
      RMQ_PASSWORD: guest
      RMQ_PRODUCT_FROM_CATALOG_QUEUE: catalog-product-messages-queue

    healthcheck:
      test: "curl -f http://localhost:8080/health"
      interval: 5s
      timeout: 5s
      retries: 5

    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    networks:
      - shop-network
      - shop-pg-network

  orders-service:
    image: shop-orders-service
    build:
      context: .
      dockerfile: OrdersService/OrdersService/Dockerfile
    pull_policy: build
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CONNECTION_STRING: Host=postgres:5432;Username=postgres;Password=P@ssw0rd;Database=Orders
      RMQ_HOST: rabbitmq
      RMQ_PORT: 5672
      RMQ_USER: guest
      RMQ_PASSWORD: guest
      RMQ_VHOST: /
      Keycloak__AuthServerUrl: http://keycloak:8080
      Keycloak__Realm: shop
      Keycloak__ClientId: shop-services
      Keycloak__ClientSecret: service-secret-123

    healthcheck:
      test: "curl -f http://localhost:8080/health"
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started  

    networks:
      - shop-network
      - shop-pg-network

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - shop-network
    labels:
      - app=shop
    restart: unless-stopped
    healthcheck:
      test: "redis-cli ping"
      interval: 5s
      timeout: 5s
      retries: 5

  storage-service:
    image: shop-storage-service
    build:
      context: .
      dockerfile: StorageService/StorageService/Dockerfile
    pull_policy: build
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CONNECTION_STRING: Host=postgres:5432;Username=postgres;Password=P@ssw0rd;Database=StorageDb
      RMQ_HOST: rabbitmq
      RMQ_PORT: 5672
      RMQ_USER: guest
      RMQ_PASSWORD: guest
      RMQ_CART_PRODUCT_QUEUE: storage-product-messages-queue
      RMQ_PRODUCT_EXCHANGE: storage-messages-exchange
      Keycloak__AuthServerUrl: http://keycloak:8080
      Keycloak__Realm: shop
      Keycloak__ClientId: shop-services
      Keycloak__ClientSecret: service-secret-123

    healthcheck:
      test: "curl -f http://localhost:8080/health"
      interval: 5s
      timeout: 5s
      retries: 5

    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started 

    networks:
      - shop-network
      - shop-pg-network
  
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_MULTIPLE_DATABASES: UsersDb,CartDb,FavoriteDb,CatalogDb,Orders,StorageDb
    volumes:
      - ./init-multiple-postgres-databases.sql:/docker-entrypoint-initdb.d/10-init-multiple-postgres-databases.sql:ro
    ports:
      - "5432:5432"
    networks:
      - shop-pg-network
    labels:
      - app=shop
      
    restart: unless-stopped
    healthcheck:
      test: "pg_isready -U postgres"
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-init:
    image: postgres:latest
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: P@ssw0rd
      PGDATABASE: postgres
    volumes:
      - ./init-multiple-postgres-databases.sql:/init.sql:ro
    command: ["psql", "-f", "/init.sql"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shop-pg-network
    restart: "no"
      
      
  rabbitmq:
    image: rabbitmq:4.1-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    
    restart: unless-stopped
    
    networks:
      - shop-network
    labels:
      - app=shop
    healthcheck:
      test: "rabbitmqctl status > /dev/null 2>&1;"
      interval: 5s
      timeout: 5s
      retries: 5

  notification-service:
    image: shop-notification-service
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    pull_policy: build
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__User: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
      RabbitMq__UiQueue: shop.notifications.ui
    healthcheck:
      test: "curl -f http://localhost:8080/health"
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - shop-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    command: start-dev --import-realm
    environment:
        KEYCLOAK_ADMIN: admin           
        KEYCLOAK_ADMIN_PASSWORD: 123456 
        KC_HOSTNAME: localhost
        KC_HTTP_ENABLED: true
        KC_DB: postgres
        KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
        KC_DB_USERNAME: keycloak
        KC_DB_PASSWORD: keycloak123
    volumes:
    - ./keycloak-config:/opt/keycloak/data/import:ro
    ports:
    - "8080:8080"
    depends_on:
     keycloak-db:
      condition: service_healthy
    networks:
    - shop-network
    - shop-pg-network
    healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
        interval: 30s
        timeout: 10s
        retries: 10
        start_period: 40s
    restart: unless-stopped

  keycloak-db:
    image: postgres:15
    environment:
        POSTGRES_DB: keycloak
        POSTGRES_USER: keycloak
        POSTGRES_PASSWORD: keycloak123
    volumes:
    - keycloak-db-data:/var/lib/postgresql/data
    networks:
    - shop-pg-network
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U keycloak"]
        interval: 10s
        timeout: 5s
        retries: 5
    restart: unless-stopped
 
  nginx-proxy:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./ApiGate/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./ApiGate:/etc/nginx/ApiGate:ro
    
    depends_on:
      users-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      favorite-service:
        condition: service_healthy
      orders-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      #ui-service:
      #  condition: service_healthy
        
    restart: unless-stopped

    networks:
      - shop-network
    labels:
      - app=shop

    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  shop-network:
    name: shop-network
    labels:
      - app=shop
  shop-pg-network:
    name: shop-pg-network
    labels:
      - app=shop

volumes:
  rabbitmq-data:
  keycloak-db-data:
