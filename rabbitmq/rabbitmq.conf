## RabbitMQ runtime configuration
## Loaded by compose via bind-mount.
##
## Variant A: preload exchanges/queues/bindings/users via definitions.json
management.load_definitions = /etc/rabbitmq/definitions.json

## Allow the default "guest" user to connect from other containers/hosts.
## This repo historically uses guest/guest in service env vars.
loopback_users.guest = false

